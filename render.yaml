# Render blueprint for G-Bridge
# - Web service for Django backend
# - Static site for React frontend
# - Postgres database (free plan)

services:
  - type: web
    name: g-bridge-backend
    repo: https://github.com/rahomi/G-Bridge
    branch: main
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: python backend/manage.py migrate --noinput && python backend/manage.py collectstatic --noinput && gunicorn backend.wsgi:application --chdir backend
    healthCheckPath: /api/health/
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ""
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: REFRESH_TOKEN
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: FRONTEND_ORIGINS
        value: ""
      - key: CSRF_TRUSTED_ORIGINS
        value: ""
    autoDeploy: true

  - type: web
    runtime: static
    name: g-bridge-frontend
    repo: https://github.com/rahomi/G-Bridge
    branch: main
    rootDir: frontend
    buildCommand: npm ci && npm run build
    # Vite outputs the built files to `dist` inside the `rootDir`.
    # Keep `staticPublishPath` relative to the `rootDir`.
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://<your-backend>.onrender.com"
    autoDeploy: true

databases:
  - name: g-bridge-db
    plan: basic-256mb
